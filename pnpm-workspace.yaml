confirmModulesPurge: false

packages:
  - backend/cloudflare

allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': set this to true or false
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  workerd: true

onlyBuiltDependencies:
  - esbuild
  - '@firebase/util'
  - protobufjs
  - unrs-resolver

overrides:
  'ajv@>=8': 8.18.0
  'eslint>ajv': 6.12.6
  fast-xml-parser: 5.5.7
  lodash: 4.18.1
  'minimatch@>=5 <5.1.7': 5.1.9
  'minimatch@>=9 <9.0.6': 9.0.9
  'minimatch@>=10 <10.2.1': 10.2.5
  node-forge: 1.4.0
  'picomatch@<2.3.2': 2.3.2
  'picomatch@>=4 <4.0.4': 4.0.4
  serialize-javascript: 7.0.5
  vite: 'catalog:'
  vitest: 'catalog:'

# First-party scope — our own packages, exempt from the release-age cooldown.
minimumReleaseAgeExclude:
  - '@kidlib/*'
  - miniflare@4.20260617.0
  - wrangler@4.102.0
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vitest: 4.1.9
  vite-plus: 0.2.1
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
