<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#82b5ecff" />
    <title>HangVidU</title>
    <link rel="stylesheet" href="/src/shared/styles/main.css" />
    <link rel="icon" href="/favicon.ico" />
  </head>
  <body>
    <div id="app" class="main-wrapper">
      <header id="top-bar" class="top-bar">
        <div id="title-auth-bar" class="title-auth-bar animated-flex">
          <h1 id="app-title-h1" class="app-title">
            <a id="app-title-a"><span id="app-title-span">HangVidU</span></a>
          </h1>
        </div>

        <div class="top-right-menu">
          <div class="search-section">
            <div class="search-controls">
              <input
                class="hidden"
                type="search"
                id="searchQuery"
                placeholder="Search YouTube videos..."
                autocomplete="off"
                spellcheck="false"
              />
              <button
                type="button"
                id="searchBtn"
                title="Search YouTube videos"
                aria-label="Search YouTube videos"
              >
                <i data-lucide="search"></i>
              </button>
            </div>
            <div
              id="searchResults"
              class="search-results hidden"
              aria-live="polite"
            ></div>
          </div>
        </div>
      </header>

      <div id="onetap-container"></div>

      <main class="relative-wrapper">
        <div id="videos">
          <div
            id="local-video-box"
            class="hidden box video-box local-video-box"
          >
            <video id="local-video-el" autoplay playsinline muted></video>
          </div>

          <div
            id="remote-video-box"
            class="hidden box video-box remote-video-box"
          >
            <video id="remote-video-el" autoplay playsinline></video>
          </div>

          <div
            id="shared-video-box"
            class="box video-box shared-video-box hidden"
          >
            <video id="shared-video-el" controls playsinline></video>
          </div>

          <div
            id="yt-video-box"
            class="box video-box yt-video-box hidden"
          ></div>
        </div>

        <div id="lobby" class="lobby">
          <div id="lobby-buttons-container" class="lobby-buttons-container">
            <button
              type="button"
              title="Start call"
              aria-label="Start call"
              class="lobby-btn"
              id="lobby-call-btn"
            >
              <i data-lucide="phone"></i>
            </button>
            <button
              type="button"
              title="Paste invite link to join call"
              aria-label="Paste invite link to join call"
              class="lobby-btn"
              id="paste-join-btn"
            >
              <i data-lucide="clipboard-paste"></i>
            </button>
            <button
              type="button"
              title="Add contact"
              aria-label="Add contact"
              class="lobby-btn"
              id="add-contact-btn"
            >
              <i data-lucide="user-plus"></i>
            </button>
          </div>
        </div>
      </main>

      <div id="chat-controls" class="hidden chat-controls bottom">
        <button
          type="button"
          class="chat-btn hidden"
          id="exit-watch-mode-btn"
          title="Exit watch mode"
          aria-label="Exit watch mode"
        >
          <i data-lucide="x"></i>
        </button>
        <button
          type="button"
          class="chat-btn"
          id="call-btn"
          title="Start call"
          aria-label="Start call"
        >
          <i data-lucide="phone"></i>
        </button>
        <button
          type="button"
          class="chat-btn"
          id="camera-btn"
          title="Toggle camera"
          aria-label="Toggle camera"
        >
          <i data-lucide="video"></i>
        </button>
        <button
          type="button"
          class="chat-btn"
          id="switch-camera-btn"
          title="Switch camera"
          aria-label="Switch camera"
        >
          <i data-lucide="refresh-cw"></i>
        </button>

        <button
          type="button"
          class="chat-btn"
          id="mic-btn"
          title="Toggle microphone"
          aria-label="Toggle microphone"
        >
          <i data-lucide="mic"></i>
        </button>
        <button
          type="button"
          class="chat-btn"
          id="mute-btn"
          title="Toggle remote audio"
          aria-label="Toggle remote audio"
          disabled
        >
          <i data-lucide="volume-2"></i>
        </button>

        <button
          type="button"
          style="display: none"
          class="chat-btn"
          id="fullscreen-partner-btn"
          title="Fullscreen partner video"
          aria-label="Fullscreen partner video"
        >
          <i data-lucide="maximize"></i>
        </button>

        <button
          type="button"
          class="chat-btn hidden"
          id="remote-pip-btn"
          title="Open partner video in picture-in-picture"
          aria-label="Open partner video in picture-in-picture"
          disabled
        >
          <i data-lucide="copy"></i>
        </button>

        <button
          type="button"
          class="chat-btn"
          id="hang-up-btn"
          title="Hang up"
          aria-label="Hang up"
          disabled
        >
          <i data-lucide="phone-off"></i>
        </button>
      </div>

      <button
        type="button"
        id="app-pip-btn"
        style="display: none"
        title="Open app in floating window"
        aria-label="Open app in floating window"
      >
        <i data-lucide="monitor"></i>
      </button>

      <footer id="legal-footer" class="legal-footer">
        <a
          class="legal-footer-link"
          href="/privacy-policy.html"
          target="_blank"
          rel="noopener noreferrer"
          title="View Privacy Policy"
          aria-label="View Privacy Policy"
          >Privacy</a
        >
        <span class="legal-footer-separator">&bull;</span>
        <a
          class="legal-footer-link"
          href="/terms-of-service.html"
          target="_blank"
          rel="noopener noreferrer"
          title="View Terms of Service"
          aria-label="View Terms of Service"
          >Terms</a
        >
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
