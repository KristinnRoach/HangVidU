<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HangVidU · P2P Data Model Explorer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --hangvidu: #58a6ff;
  --hangvidu-dim: #1a2d4a;
  --p2p: #3fb950;
  --p2p-dim: #1a3028;
  --imp: #d29922;
  --imp-dim: #2c2010;
  --danger: #f85149;
  --mono: 'SF Mono', 'Fira Code', Consolas, monospace;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 13px;
  overflow: hidden;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  flex-wrap: wrap;
  min-height: 44px;
}
h1 { font-size: 13px; font-weight: 600; white-space: nowrap; }
h1 span { color: var(--muted); font-weight: 400; }
.view-tabs { display: flex; gap: 2px; }
.tab-btn {
  padding: 3px 9px;
  border-radius: 5px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: all 0.1s;
}
.tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active { color: var(--text); background: var(--surface2); border-color: var(--border); }

.imp-section {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-left: auto;
}
.imp-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
.imp-chip {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  transition: all 0.15s;
}
.imp-chip:hover { border-color: var(--imp); color: var(--imp); }
.imp-chip.on { border-color: var(--imp); background: var(--imp-dim); color: var(--imp); }
.final-chip { border-color: rgba(88,166,255,0.3); color: var(--hangvidu); }
.final-chip:hover { border-color: var(--hangvidu); color: var(--hangvidu); }
.final-chip.on { border-color: var(--hangvidu); background: var(--hangvidu-dim); color: var(--hangvidu); }
.imp-chip .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* MAIN */
main {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.view { display: none; position: absolute; inset: 0; }
.view.active { display: flex; }

/* TREE VIEW */
#tree-view { flex-direction: row; }

.zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.zone:last-child { border-right: none; }

.zone-header {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  background: var(--surface);
}
.zone-badge {
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  flex-shrink: 0;
  text-transform: uppercase;
}
.zone-badge.hv { background: var(--hangvidu-dim); color: var(--hangvidu); border: 1px solid rgba(88,166,255,0.3); }
.zone-badge.p2p { background: var(--p2p-dim); color: var(--p2p); border: 1px solid rgba(63,185,80,0.3); }
.zone-subtitle { font-size: 10px; color: var(--muted); font-family: var(--mono); }
.zone-desc { font-size: 10px; color: var(--muted); margin-left: auto; text-align: right; }

.zone-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* NODE CARDS */
.node-card {
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}
.node-card.hv-card { border-left: 3px solid var(--hangvidu); }
.node-card.p2p-card { border-left: 3px solid var(--p2p); }
.node-card.imp-card { border-left: 3px solid var(--imp); }

.node-head {
  padding: 7px 10px;
  background: var(--surface2);
  display: flex;
  align-items: flex-start;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.node-head:hover { background: var(--surface); }

.caret { font-size: 9px; color: var(--muted); margin-top: 3px; flex-shrink: 0; transition: transform 0.12s; }
.collapsed .caret { transform: rotate(-90deg); }

.node-meta { flex: 1; min-width: 0; }
.node-path {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.pp { color: var(--imp); } /* path param */
.ps { color: var(--text); } /* path segment */
.node-label { font-size: 12px; font-weight: 600; }
.node-desc { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.node-lc { font-size: 10px; color: var(--muted); font-style: italic; margin-top: 3px; }

/* FIELDS */
.fields-wrap { border-top: 1px solid var(--border); }

.fields-cols {
  display: grid;
  grid-template-columns: 140px 105px 40px 1fr 44px;
  gap: 4px;
  padding: 3px 10px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.fields-cols span { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

.field-row {
  display: grid;
  grid-template-columns: 140px 105px 40px 1fr 44px;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  min-height: 34px;
  transition: background 0.08s;
}
.field-row:last-child { border-bottom: none; }
.field-row:hover { background: var(--surface2); }
.field-row.imp-field { background: var(--imp-dim); }
.field-row.imp-field:hover { filter: brightness(1.15); }
.field-row.editing-row { background: var(--surface); }

.fn { font-family: var(--mono); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fn.param-name { color: var(--imp); }

.ftype {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.t-string  { background: #162032; color: #79c0ff; }
.t-number, .t-timestamp { background: #162216; color: #56d364; }
.t-boolean { background: #1f1628; color: #d2a8ff; }
.t-enum    { background: #241e0e; color: #e3b341; }
.t-rtc     { background: #1e1214; color: #ff7b72; }
.t-object  { background: #1a1a1a; color: #8b949e; }

.freq { font-size: 9px; font-weight: 700; text-align: center; }
.req-y { color: var(--danger); }
.req-n { color: var(--muted); }

.fex { font-family: var(--mono); font-size: 9px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.enum-chips { display: flex; gap: 2px; flex-wrap: wrap; }
.enum-chip { font-family: var(--mono); font-size: 9px; padding: 1px 4px; border-radius: 2px; background: var(--surface2); color: var(--imp); border: 1px solid rgba(210,153,34,0.25); }

.fbtns { display: flex; gap: 2px; justify-content: flex-end; }
.fbtn {
  width: 20px; height: 20px;
  border-radius: 3px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
}
.fbtn:hover { background: var(--surface2); color: var(--text); }
.fbtn.del:hover { background: #2a1515; color: var(--danger); }

/* INLINE EDITOR */
.field-editor {
  padding: 8px 10px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: flex-end;
}
.ed-grp { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 80px; }
.ed-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.ed-inp, .ed-sel {
  padding: 3px 7px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 11px;
  font-family: var(--mono);
  outline: none;
  width: 100%;
}
.ed-inp:focus, .ed-sel:focus { border-color: var(--hangvidu); }
.ed-sel { cursor: pointer; }
.ed-req { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 11px; color: var(--muted); white-space: nowrap; }
.ed-req input { cursor: pointer; accent-color: var(--hangvidu); }
.ed-actions { display: flex; gap: 4px; align-items: flex-end; flex-shrink: 0; }
.btn-save {
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--hangvidu);
  background: var(--hangvidu-dim);
  color: var(--hangvidu);
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
}
.btn-save:hover { background: var(--hangvidu); color: var(--bg); }
.btn-cancel {
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
}
.btn-cancel:hover { background: var(--surface2); color: var(--text); }

.add-field-row {
  padding: 5px 10px;
  border-top: 1px solid var(--border);
}
.btn-add {
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  transition: all 0.1s;
}
.btn-add:hover { border-color: var(--hangvidu); color: var(--hangvidu); }

.imp-note-bar {
  padding: 5px 10px;
  background: var(--imp-dim);
  border-bottom: 1px solid rgba(210,153,34,0.3);
  font-size: 10px;
  color: var(--imp);
  display: flex;
  align-items: center;
  gap: 5px;
}
.imp-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--imp-dim); color: var(--imp); border: 1px solid rgba(210,153,34,0.4); }

/* FLOW VIEW */
#flow-view {
  flex-direction: column;
  overflow-y: auto;
  padding: 20px;
  align-items: center;
}

.flow-wrap { width: 100%; max-width: 820px; }

.flow-phase-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 16px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.flow-phase-label::before, .flow-phase-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.flow-step {
  display: grid;
  grid-template-columns: 140px 1fr 140px;
  gap: 8px;
  align-items: center;
  padding: 4px 0;
}

.actor {
  padding: 6px 10px;
  border-radius: 6px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid;
}
.a-caller { background: var(--hangvidu-dim); color: var(--hangvidu); border-color: rgba(88,166,255,0.3); }
.a-callee { background: var(--p2p-dim); color: var(--p2p); border-color: rgba(63,185,80,0.3); }
.a-rtdb { background: var(--surface2); color: var(--text); border-color: var(--border); }
.a-ghost { opacity: 0; pointer-events: none; }

.arrow-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.arrow-action { font-size: 11px; font-weight: 500; text-align: center; }
.arrow-path { font-family: var(--mono); font-size: 9px; color: var(--muted); text-align: center; }
.arrow-note { font-size: 9px; color: var(--imp); text-align: center; }
.arrow-owner-hv { font-size: 9px; color: var(--hangvidu); }
.arrow-owner-p2p { font-size: 9px; color: var(--p2p); }
.arrow-line {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 2px;
  color: var(--muted);
  font-size: 12px;
  margin-top: 2px;
}
.arrow-line .line { flex: 1; height: 1px; background: var(--border); }

/* FOOTER */
footer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  max-height: 150px;
}
.footer-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.footer-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.exp-tabs { display: flex; gap: 2px; }
.exp-tab {
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
}
.exp-tab.active { background: var(--surface2); color: var(--text); border-color: var(--border); }
.btn-copy {
  margin-left: auto;
  padding: 3px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  transition: all 0.12s;
}
.btn-copy:hover { border-color: var(--hangvidu); color: var(--hangvidu); }
.btn-copy.copied { border-color: var(--p2p); color: var(--p2p); }

#output-text {
  flex: 1;
  overflow-y: auto;
  padding: 7px 12px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <h1>HangVidU <span>· P2P Data Model</span></h1>
  <div class="view-tabs">
    <button class="tab-btn active" data-view="tree-view" onclick="setView('tree-view',this)">Tree</button>
    <button class="tab-btn" data-view="flow-view" onclick="setView('flow-view',this)">Call Flow</button>
  </div>
  <div class="imp-section">
    <span class="imp-label">Model</span>
    <span class="imp-label">All shown fields are implemented</span>
  </div>
</header>

<main>
  <div id="tree-view" class="view active">
    <div class="zone">
      <div class="zone-header">
        <span class="zone-badge hv">HangVidU</span>
        <span class="zone-subtitle">users/{userId}/calls/…</span>
        <span class="zone-desc">App-owned · call mailbox signaling</span>
      </div>
      <div class="zone-body" id="zone-hv"></div>
    </div>
    <div class="zone">
      <div class="zone-header">
        <span class="zone-badge p2p">@kidlib/p2p</span>
        <span class="zone-subtitle">rooms/{roomId}/…</span>
        <span class="zone-desc">Package-managed · WebRTC room signaling</span>
      </div>
      <div class="zone-body" id="zone-p2p"></div>
    </div>
  </div>

  <div id="flow-view" class="view">
    <div class="flow-wrap" id="flow-content"></div>
  </div>
</main>

<footer>
  <div class="footer-bar">
    <span class="footer-label">Export</span>
    <div class="exp-tabs">
      <button class="exp-tab active" data-exp="prompt" onclick="setExport('prompt',this)">Prompt</button>
      <button class="exp-tab" data-exp="json" onclick="setExport('json',this)">JSON</button>
    </div>
    <button class="btn-copy" id="copy-btn" onclick="doCopy()">Copy</button>
  </div>
  <pre id="output-text"></pre>
</footer>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const st = {
  view: 'tree-view',
  exp: 'prompt',
  imps: {},
  editing: null,   // { nodeId, fieldId }
  collapsed: new Set(),
};

// ── MODEL ──────────────────────────────────────────────────────────────────
const model = [
  {
    id: 'invite',
    zone: 'hv',
    path: 'users/{calleeId}/calls/incoming',
    label: 'CallInvite',
    desc: "Callee's incoming call mailbox. Caller writes here to ring the callee.",
    lifecycle: "Written by: caller  ·  Cleared by: callee on accept/reject/timeout",
    fields: [
      { id:'i1', name:'roomId',     type:'string',    req:true,  ex:'"room_a1b2c3d4e5f6g7h8"', desc:'Shared room ID — both peers join this room' },
      { id:'i2', name:'callerId',   type:'string',    req:true,  ex:'"uid_alice"',               desc:'UID of the caller' },
      { id:'i3', name:'calleeId',   type:'string',    req:false, ex:'"uid_bob"',                 desc:'Explicit callee UID for rules/debugging' },
      { id:'i4', name:'callerName', type:'string',    req:false, ex:'"Alice"',                   desc:'Display name shown in incoming call UI' },
      { id:'i5', name:'audioOnly',  type:'boolean',   req:false, ex:'false',                     desc:'Omit video track if true' },
      { id:'i6', name:'startedAt',  type:'timestamp', req:true,  ex:'1715500000000',             desc:'Unix ms — used for freshness/timeout checks' },
      { id:'i7', name:'expiresAt',  type:'timestamp', req:false, ex:'1715500060000',             desc:'Unix ms — stale invite cleanup hint' },
    ]
  },
  {
    id: 'response',
    zone: 'hv',
    path: 'users/{calleeId}/calls/response',
    label: 'CallResponse',
    desc: "Callee's own response mailbox. Caller watches callee's path after initiating a call.",
    lifecycle: "Written by: callee (own node) · Cleared by: callee",
    fields: [
      { id:'r1', name:'roomId',       type:'string',    req:true,  ex:'"room_a1b2c3d4e5f6g7h8"', desc:'Echoed back for correlation' },
      { id:'r2', name:'responseType', type:'enum',      req:true,  ex:'"accepted"',               desc:'Call outcome', enumValues:['accepted','rejected'] },
      { id:'r3', name:'by',           type:'string',    req:true,  ex:'"uid_bob"',                desc:'UID of the responder (callee)' },
      { id:'r4', name:'respondedAt',  type:'timestamp', req:true,  ex:'1715500010000',            desc:'Unix ms response time' },
      { id:'r5', name:'expiresAt',    type:'timestamp', req:false, ex:'1715500070000',            desc:'Unix ms — stale response cleanup hint' },
    ]
  },
  {
    id: 'room_meta',
    zone: 'hv',
    path: 'rooms/{roomId}/meta',
    label: 'Room Metadata',
    desc: 'App-owned room metadata. Created before invite so room access exists before p2p join.',
    lifecycle: "Written by: caller  ·  Cleaned up by: HangVidU on room cleanup",
    fields: [
      { id:'m1', name:'createdBy', type:'string',    req:true, ex:'"uid_alice"',    desc:'UID of room creator (caller)' },
      { id:'m2', name:'createdAt', type:'timestamp', req:true, ex:'1715500000000', desc:'Room creation timestamp' },
      { id:'m3', name:'expiresAt', type:'timestamp', req:true, ex:'1715507200000', desc:'Room authorization expiry timestamp' },
    ]
  },
  {
    id: 'participants',
    zone: 'hv',
    path: 'rooms/{roomId}/participants/{uid}',
    label: 'Room Participants',
    desc: 'App-owned authorization list. RTDB rules allow p2p signaling only for listed users.',
    lifecycle: "Written by: room creator  ·  Used by RTDB rules for room access",
    fields: [
      { id:'rp1', name:'(value)', type:'boolean', req:true, ex:'true', desc:'Participant membership flag' },
    ]
  },
  {
    id: 'presence',
    zone: 'p2p',
    path: 'rooms/{roomId}/p2pSignaling/presence/{peerId}',
    label: 'Presence',
    desc: 'Peer presence flag. Set on join, auto-removed on disconnect via onDisconnect().',
    lifecycle: "Fully managed by @kidlib/p2p — no app code required",
    fields: [
      { id:'p1', name:'(value)', type:'boolean', req:true, ex:'true', desc:'Always true — key absence means peer left' },
    ]
  },
  {
    id: 'sdp',
    zone: 'p2p',
    path: 'rooms/{roomId}/p2pSignaling/pairs/{pairId}/sdp',
    label: 'SDP Exchange',
    desc: 'WebRTC offer/answer exchange. pairId = [peerA, peerB].sort().join(":")',
    lifecycle: "Fully managed by @kidlib/p2p — written during WebRTC handshake",
    fields: [
      { id:'s1', name:'offer',  type:'RTCSessionDescriptionInit', req:false, ex:'{ type:"offer",  sdp:"v=0…" }', desc:"Offerer's SDP — written first" },
      { id:'s2', name:'answer', type:'RTCSessionDescriptionInit', req:false, ex:'{ type:"answer", sdp:"v=0…" }', desc:"Answerer's SDP — written in response" },
    ]
  },
  {
    id: 'ice',
    zone: 'p2p',
    path: 'rooms/{roomId}/p2pSignaling/pairs/{pairId}/ice/{peerId}/',
    label: 'ICE Candidates',
    desc: 'Append-only ICE candidate list per peer. Written with RTDB push() — each entry gets a unique push key.',
    lifecycle: "Fully managed by @kidlib/p2p — appended during ICE gathering",
    fields: [
      { id:'c1', name:'{pushKey}', type:'RTCIceCandidateInit', req:false, ex:'{ candidate:"candidate:…", sdpMid:"0", sdpMLineIndex:0 }', desc:'One ICE candidate per push()' },
    ]
  },
];

function getEffectiveModel() {
  return model.map(n => ({ ...n, fields: n.fields.map(f => ({...f})) }));
}

// ── TYPE STYLING ───────────────────────────────────────────────────────────
const TYPE_CLASS = {
  string: 't-string', number: 't-number', boolean: 't-boolean',
  timestamp: 't-timestamp', enum: 't-enum',
  RTCSessionDescriptionInit: 't-rtc', RTCIceCandidateInit: 't-rtc',
  object: 't-object',
};
function tc(t) { return TYPE_CLASS[t] || 't-object'; }

const FIELD_TYPES = ['string','number','boolean','timestamp','enum','RTCSessionDescriptionInit','RTCIceCandidateInit','object'];

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── PATH RENDER ────────────────────────────────────────────────────────────
function renderPath(path) {
  return path.split('/').map((seg, i, arr) => {
    const cls = seg.startsWith('{') ? 'pp' : 'ps';
    const slash = i < arr.length - 1 ? '<span style="color:var(--border)">/</span>' : '';
    return `<span class="${cls}">${esc(seg)}</span>${slash}`;
  }).join('');
}

// ── RENDER TREE ────────────────────────────────────────────────────────────
function renderTree() {
  const nodes = getEffectiveModel();
  const hvSubtitle = document.querySelector('#tree-view .zone:first-child .zone-subtitle');
  if (hvSubtitle) hvSubtitle.textContent = 'users/{userId}/calls/…';
  document.getElementById('zone-hv').innerHTML  = nodes.filter(n => n.zone === 'hv').map(renderCard).join('');
  document.getElementById('zone-p2p').innerHTML = nodes.filter(n => n.zone === 'p2p').map(renderCard).join('');
}

function renderCard(node) {
  const collapsed = st.collapsed.has(node.id);
  const isImp = !!node._imp;
  const borderCls = isImp ? 'imp-card' : (node.zone === 'hv' ? 'hv-card' : 'p2p-card');

  let inner = '';
  if (!collapsed) {
    const fieldsHtml = node.fields.map(f => renderFieldRow(node.id, f)).join('');
    inner = `
      <div class="fields-wrap">
        <div class="fields-cols"><span>Field</span><span>Type</span><span>Req</span><span>Example / Values</span><span></span></div>
        <div id="fields-${node.id}">${fieldsHtml}</div>
        <div class="add-field-row"><button class="btn-add" onclick="addField('${node.id}')">+ add field</button></div>
      </div>`;
  }

  return `<div class="node-card ${borderCls}${collapsed ? ' collapsed' : ''}" id="card-${node.id}">
    <div class="node-head" onclick="toggleCollapse('${node.id}')">
      <span class="caret">▼</span>
      <div class="node-meta">
        <div class="node-path">${renderPath(node.path)}</div>
        <div class="node-label">${esc(node.label)}${isImp ? ` <span class="imp-badge">suggestion</span>` : ''}</div>
        <div class="node-desc">${esc(node.desc)}</div>
        <div class="node-lc">${esc(node.lifecycle)}</div>
      </div>
    </div>
    ${inner}
  </div>`;
}

function renderFieldRow(nodeId, field) {
  const isImpField = !!field._imp;
  const isEditing  = st.editing && st.editing.nodeId === nodeId && st.editing.fieldId === field.id;
  const isParam    = field.name.startsWith('{') || field.name === '(value)';
  const canEdit    = !isImpField;
  const canDel     = !isImpField && !['p1'].includes(field.id);

  const exDisplay = field.type === 'enum' && field.enumValues
    ? `<div class="enum-chips">${field.enumValues.map(v => `<span class="enum-chip">${esc(v)}</span>`).join('')}</div>`
    : `<span class="fex" title="${esc(field.ex)}">${esc(field.ex)}</span>`;

  const rowCls = `field-row${isImpField ? ' imp-field' : ''}${isEditing ? ' editing-row' : ''}`;

  let editorHtml = '';
  if (isEditing) {
    const typeOpts = FIELD_TYPES.map(t => `<option${t === field.type ? ' selected' : ''}>${t}</option>`).join('');
    editorHtml = `
      <div class="field-editor">
        <div class="ed-grp" style="min-width:110px">
          <label class="ed-lbl">Name</label>
          <input class="ed-inp" id="ed-name" value="${esc(field.name)}">
        </div>
        <div class="ed-grp" style="min-width:130px">
          <label class="ed-lbl">Type</label>
          <select class="ed-sel" id="ed-type">${typeOpts}</select>
        </div>
        <div class="ed-grp" style="flex:2">
          <label class="ed-lbl">Example</label>
          <input class="ed-inp" id="ed-ex" value="${esc(field.ex)}">
        </div>
        <div class="ed-grp" style="min-width:60px">
          <label class="ed-lbl">Description</label>
          <input class="ed-inp" id="ed-desc" value="${esc(field.desc || '')}">
        </div>
        <div class="ed-actions">
          <label class="ed-req"><input type="checkbox" id="ed-req"${field.req ? ' checked' : ''}> req</label>
          <button class="btn-save" onclick="saveField('${nodeId}','${field.id}')">Save</button>
          <button class="btn-cancel" onclick="cancelEdit()">✕</button>
        </div>
      </div>`;
  }

  return `
    <div class="${rowCls}" id="fr-${nodeId}-${field.id}">
      <span class="fn${isParam ? ' param-name' : ''}" title="${esc(field.desc || '')}">${esc(field.name)}</span>
      <span class="ftype ${tc(field.type)}">${esc(field.type)}</span>
      <span class="freq ${field.req ? 'req-y' : 'req-n'}">${field.req ? 'req' : 'opt'}</span>
      <div>${exDisplay}</div>
      <div class="fbtns">
        ${canEdit ? `<button class="fbtn" title="Edit" onclick="editField(event,'${nodeId}','${field.id}')">✎</button>` : ''}
        ${canDel  ? `<button class="fbtn del" title="Delete" onclick="deleteField('${nodeId}','${field.id}')">×</button>` : ''}
      </div>
    </div>
    ${isEditing ? editorHtml : ''}`;
}

// ── RENDER FLOW ────────────────────────────────────────────────────────────
function renderFlow() {
  const invPath = 'users/{calleeId}/calls/incoming';
  const respPath = 'users/{calleeId}/calls/response';

  const steps = [
    { phase: 'Phase 1 — Call Signaling  (HangVidU)' },
    { from:'Caller', to:'RTDB',   dir:'→', action:'createRoomAccess(roomId, participants)',         path:'rooms/{roomId}/meta + participants', owner:'hv' },
    { from:'Caller', to:'RTDB',   dir:'→', action:'sendInvite(calleeId, invite)',                   path: invPath,  owner:'hv' },
    { from:'RTDB',   to:'Callee', dir:'→', action:'onInviteReceived() fires',                        path:'(onValue listener)',              owner:'hv' },
    { from:'Callee', to:'RTDB',   dir:'→', action:'sendResponse({ accepted | rejected })',           path: respPath,                         owner:'hv' },
    { from:'RTDB',   to:'Caller', dir:'→', action:'onResponseReceived() fires',                      path:'dynamic subscription: users/{calleeId}/calls/response', owner:'hv' },
    { from:'Caller', to:'RTDB',   dir:'→', action:'Cancel: remove incoming invite',                  path: invPath, note:'no response written', owner:'hv' },
    { from:'Caller', to:'RTDB',   dir:'→', action:'Timeout: remove incoming invite',                 path: invPath, note:'no response written', owner:'hv' },
    { phase: 'Phase 2 — Room Join  (HangVidU → @kidlib/p2p handoff)' },
    { from:'Caller', to:'RTDB',   dir:'→', action:'presence.join(callerId)',                         path:'rooms/{roomId}/p2pSignaling/presence/{callerId}',  owner:'p2p' },
    { from:'Callee', to:'RTDB',   dir:'→', action:'presence.join(calleeId)',                         path:'rooms/{roomId}/p2pSignaling/presence/{calleeId}',  owner:'p2p' },
    { from:'RTDB',   to:'',       dir:'',  action:'onDisconnect() registered → auto-removes presence on drop', path:'', owner:'p2p' },
    { phase: 'Phase 3 — WebRTC Handshake  (@kidlib/p2p)' },
    { from:'Caller', to:'RTDB',   dir:'→', action:'sendOffer(offer)',                                path:'rooms/{roomId}/p2pSignaling/pairs/{pairId}/sdp/offer',   owner:'p2p' },
    { from:'Callee', to:'RTDB',   dir:'→', action:'sendAnswer(answer)',                              path:'rooms/{roomId}/p2pSignaling/pairs/{pairId}/sdp/answer',  owner:'p2p' },
    { from:'Both',   to:'RTDB',   dir:'↔', action:'sendCandidate() / onRemoteCandidate()',           path:'rooms/{roomId}/p2pSignaling/pairs/{pairId}/ice/{peerId}/', owner:'p2p' },
    { from:'',       to:'',       dir:'',  action:'WebRTC peer connection established — RTDB no longer needed', path:'', owner:'p2p' },
  ];

  const actorClass = { Caller:'a-caller', Callee:'a-callee', RTDB:'a-rtdb', Both:'a-caller' };

  let html = '';
  steps.forEach(s => {
    if (s.phase) {
      html += `<div class="flow-phase-label">${s.phase}</div>`;
      return;
    }
    const ownerSpan = s.owner === 'hv'
      ? `<span class="arrow-owner-hv">HangVidU</span>`
      : `<span class="arrow-owner-p2p">@kidlib/p2p</span>`;
    const noteHtml = s.note ? `<div class="arrow-note">${s.note}</div>` : '';
    if (!s.from && !s.to) {
      html += `<div style="padding:4px 0;font-size:10px;color:var(--muted);text-align:center;font-style:italic;">${s.action}</div>`;
      return;
    }
    html += `
      <div class="flow-step">
        <div class="actor ${actorClass[s.from] || 'a-ghost'}">${s.from || ''}</div>
        <div class="arrow-col">
          <div class="arrow-action">${s.action} ${ownerSpan}</div>
          ${s.path ? `<div class="arrow-path">${s.path}</div>` : ''}
          ${noteHtml}
          <div class="arrow-line">
            ${s.dir === '↔' ? '<span>←</span>' : ''}<div class="line"></div>${s.dir !== '↔' ? '' : ''}<span>${s.dir === '↔' ? '→' : s.dir}</span>
          </div>
        </div>
        <div class="actor ${actorClass[s.to] || 'a-ghost'}">${s.to || ''}</div>
      </div>`;
  });

  document.getElementById('flow-content').innerHTML = html;
}

// ── INTERACTIONS ───────────────────────────────────────────────────────────
function setView(id, btn) {
  st.view = id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleImp(btn) {
  const key = btn.dataset.key;
  st.imps[key] = !st.imps[key];
  // Final is mutually exclusive with individual chips and vice versa
  if (key === 'final' && st.imps.final) {
    Object.keys(st.imps).forEach(k => { if (k !== 'final') st.imps[k] = false; });
    document.querySelectorAll('.imp-chip:not(.final-chip)').forEach(b => b.classList.remove('on'));
  } else if (key !== 'final' && st.imps[key] && st.imps.final) {
    st.imps.final = false;
    document.querySelector('.final-chip').classList.remove('on');
  }
  btn.classList.toggle('on', st.imps[key]);
  st.editing = null;
  renderAll();
}

function toggleCollapse(nodeId) {
  st.collapsed.has(nodeId) ? st.collapsed.delete(nodeId) : st.collapsed.add(nodeId);
  renderTree();
  updateOutput();
}

function editField(e, nodeId, fieldId) {
  e.stopPropagation();
  st.editing = (st.editing?.nodeId === nodeId && st.editing?.fieldId === fieldId) ? null : { nodeId, fieldId };
  renderTree();
}

function saveField(nodeId, fieldId) {
  const node = model.find(n => n.id === nodeId);
  if (!node) return;
  const field = node.fields.find(f => f.id === fieldId);
  if (!field) return;
  field.name = document.getElementById('ed-name').value.trim() || field.name;
  field.type = document.getElementById('ed-type').value;
  field.ex   = document.getElementById('ed-ex').value;
  field.desc = document.getElementById('ed-desc').value;
  field.req  = document.getElementById('ed-req').checked;
  st.editing = null;
  renderAll();
}

function cancelEdit() {
  st.editing = null;
  renderTree();
}

function deleteField(nodeId, fieldId) {
  const node = model.find(n => n.id === nodeId);
  if (node) node.fields = node.fields.filter(f => f.id !== fieldId);
  if (st.editing?.fieldId === fieldId) st.editing = null;
  renderAll();
}

let fid = 200;
function addField(nodeId) {
  const node = model.find(n => n.id === nodeId);
  if (!node) return;
  const f = { id: 'u' + (++fid), name: 'newField', type: 'string', req: false, ex: '"value"', desc: '' };
  node.fields.push(f);
  st.editing = { nodeId, fieldId: f.id };
  st.collapsed.delete(nodeId);
  renderAll();
}

// ── EXPORT ─────────────────────────────────────────────────────────────────
function setExport(mode, btn) {
  st.exp = mode;
  document.querySelectorAll('.exp-tab').forEach(b => b.classList.toggle('active', b === btn));
  updateOutput();
}

function updateOutput() {
  document.getElementById('output-text').textContent =
    st.exp === 'json' ? toJSON() : toPrompt();
}

function toJSON() {
  const nodes = getEffectiveModel();
  const out = {};
  nodes.forEach(n => {
    out[n.id] = {
      path: n.path,
      owner: n.zone === 'hv' ? 'HangVidU' : '@kidlib/p2p',
      label: n.label,
      lifecycle: n.lifecycle,
      fields: Object.fromEntries(n.fields.map(f => [
        f.name,
        {
          type: f.type,
          required: f.req,
          example: f.ex,
          ...(f.desc ? { description: f.desc } : {}),
          ...(f.enumValues ? { enum: f.enumValues } : {}),
        }
      ]))
    };
  });
  return JSON.stringify(out, null, 2);
}

function toPrompt() {
  const nodes = getEffectiveModel();
  const activeImps = Object.entries(st.imps).filter(([,v]) => v).map(([k]) => k);

  let out = `Update or document the HangVidU P2P data model.\n\n`;
  out += `OWNERSHIP BOUNDARY\n`;
  out += `  HangVidU owns: users/ tree (call mailbox signaling, lifecycle, Zod validation)\n`;
  out += `  @kidlib/p2p owns: rooms/ tree (WebRTC signaling — treat as opaque)\n\n`;

  out += `HANGVIDU SCHEMA\n\n`;
  nodes.filter(n => n.zone === 'hv').forEach(n => {
    out += `  ${n.label}  path: ${n.path}\n`;
    out += `  ${n.desc}\n`;
    out += `  Lifecycle: ${n.lifecycle}\n`;
    n.fields.forEach(f => {
      const req  = f.req ? 'required' : 'optional';
      const ev   = f.enumValues ? ` [${f.enumValues.join(' | ')}]` : '';
      const note = f.desc ? ` — ${f.desc}` : '';
      out += `    • ${f.name}: ${f.type}${ev} (${req})${note}\n`;
    });
    out += '\n';
  });

  out += `@KIDLIB/P2P SCHEMA (read-only reference)\n\n`;
  nodes.filter(n => n.zone === 'p2p').forEach(n => {
    out += `  ${n.label}  path: ${n.path}\n`;
    out += `  ${n.desc}\n`;
    n.fields.forEach(f => {
      const note = f.desc ? ` — ${f.desc}` : '';
      out += `    • ${f.name}: ${f.type}${note}\n`;
    });
    out += '\n';
  });

  if (activeImps.length > 0) {
    out += `ACTIVE IMPROVEMENTS TO APPLY\n`;
    activeImps.forEach(k => { out += `  • ${k}\n`; });
    out += '\n';
  }

  return out;
}

function doCopy() {
  const text = document.getElementById('output-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderTree();
  renderFlow();
  updateOutput();
}

renderAll();
</script>
</body>
</html>
