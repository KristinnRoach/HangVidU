<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HangVidU — Boundary Rules</title>
    <style>
      :root {
        --bg: #0b0d10;
        --panel: #14181d;
        --panel-2: #1a1f25;
        --line: #262c34;
        --text: #e6e8eb;
        --muted: #8a93a0;
        --accent: #6ea8fe;
        --ok: #5ac08c;
        --warn: #e0a44a;
        --bad: #d65d5d;
        --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font:
          13px/1.45 system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        display: grid;
        grid-template-columns: 320px 1fr;
        grid-template-rows: 1fr 6px var(--prompt-h, 200px);
        grid-template-areas:
          'controls canvas'
          'controls divider'
          'controls prompt';
        height: 100vh;
      }
      #divider {
        grid-area: divider;
        background: var(--line);
        cursor: ns-resize;
        position: relative;
      }
      #divider:hover,
      #divider.dragging {
        background: var(--accent);
      }
      #divider::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 2px;
        background: var(--muted);
        opacity: 0.4;
        border-radius: 2px;
      }
      body.resizing {
        cursor: ns-resize;
        user-select: none;
      }
      #controls {
        grid-area: controls;
        background: var(--panel);
        border-right: 1px solid var(--line);
        overflow-y: auto;
        padding: 16px 16px 24px;
      }
      #canvas-wrap {
        grid-area: canvas;
        position: relative;
        overflow: auto;
        background: radial-gradient(circle at 30% 20%, #11161c 0%, #0b0d10 70%);
        padding: 18px 22px;
      }
      #prompt-wrap {
        grid-area: prompt;
        background: var(--panel);
        border-top: 1px solid var(--line);
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 0;
        overflow: hidden;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 4px;
        letter-spacing: 0.3px;
      }
      h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin: 18px 0 8px;
        font-weight: 600;
      }
      p.tag {
        color: var(--muted);
        font-size: 12px;
        margin: 0 0 12px;
      }
      .preset-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      button.preset,
      button.tog {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
      }
      button.preset.active,
      button.tog.active {
        border-color: var(--accent);
        color: var(--accent);
      }
      .source-note {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        margin-top: 6px;
        word-break: break-all;
      }
      .source-note.err {
        color: var(--bad);
        border-color: #4a2424;
      }
      .source-note a {
        color: var(--accent);
      }
      .type-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .type-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        background: transparent;
        border: 1px solid transparent;
      }
      .type-row:hover {
        background: var(--panel-2);
      }
      .type-row.active {
        background: var(--panel-2);
        border-color: var(--accent);
      }
      .type-row .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .type-row .name {
        font-weight: 600;
      }
      .type-row .meta {
        margin-left: auto;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
      }
      .patterns {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        margin-top: 6px;
        max-height: 220px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* Matrix view */
      table.matrix {
        border-collapse: separate;
        border-spacing: 0;
        margin: 0 auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      table.matrix th,
      table.matrix td {
        padding: 0;
        text-align: center;
        font-size: 12px;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        height: 44px;
        min-width: 78px;
      }
      table.matrix th {
        background: var(--panel-2);
        color: var(--muted);
        font-weight: 600;
        padding: 8px 10px;
        height: auto;
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      table.matrix th.row-label {
        text-align: right;
        padding-right: 12px;
        background: var(--panel-2);
        cursor: pointer;
      }
      table.matrix th.col-label {
        cursor: pointer;
      }
      table.matrix th.row-label:hover,
      table.matrix th.col-label:hover {
        color: var(--text);
      }
      table.matrix th.row-label.focused,
      table.matrix th.col-label.focused {
        color: var(--accent);
      }
      table.matrix th .legend-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      table.matrix td.cell {
        cursor: pointer;
        transition: background 0.1s;
        font-family: var(--mono);
      }
      table.matrix td.cell:hover {
        background: var(--panel-2);
      }
      table.matrix td.cell.allow {
        background: rgba(90, 192, 140, 0.16);
        color: var(--ok);
      }
      table.matrix td.cell.allow.partial {
        background: rgba(224, 164, 74, 0.18);
        color: var(--warn);
      }
      table.matrix td.cell.disallow {
        color: #404750;
      }
      table.matrix td.cell.disallow::before {
        content: '·';
      }
      table.matrix td.cell.allow::before {
        content: '✓';
      }
      table.matrix td.cell.allow.partial::before {
        content: '~';
      }
      table.matrix td.cell.self {
        background: rgba(110, 168, 254, 0.08);
      }
      table.matrix tr.dim-row td.cell,
      table.matrix tr.dim-row th.row-label {
        opacity: 0.28;
      }
      table.matrix td.dim-col {
        opacity: 0.28;
      }
      table.matrix th.col-label.dim {
        opacity: 0.28;
      }
      table.matrix td.cell.highlight {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
      }

      .legend {
        display: flex;
        gap: 14px;
        font-size: 11px;
        color: var(--muted);
        margin: 14px auto 0;
        justify-content: center;
        flex-wrap: wrap;
      }
      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .legend i {
        font-style: normal;
        font-family: var(--mono);
      }
      .legend .sw {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        display: inline-block;
      }

      .rule-detail {
        max-width: 720px;
        margin: 18px auto 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px 16px;
        font-size: 12px;
        line-height: 1.55;
      }
      .rule-detail h3 {
        margin: 0 0 6px;
        font-size: 13px;
        color: var(--accent);
      }
      .rule-detail code {
        font-family: var(--mono);
        background: var(--panel-2);
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 11px;
      }
      .rule-detail .msg {
        color: var(--muted);
        font-style: italic;
        margin: 6px 0 0;
      }
      .rule-detail ul {
        margin: 6px 0 0;
        padding-left: 18px;
      }
      .rule-detail .empty {
        color: var(--muted);
      }
      .rule-detail .muted {
        color: var(--muted);
        font-weight: normal;
      }
      .edge-detail {
        max-height: 360px;
        overflow-y: auto;
      }
      .edge-group {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid var(--line);
      }
      .edge-group:first-of-type {
        border-top: none;
      }
      .edge-source {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .edge-group ul {
        margin: 0 0 0 4px;
        padding-left: 14px;
      }

      .error-box {
        max-width: 640px;
        margin: 40px auto;
        background: var(--panel);
        border: 1px solid #4a2424;
        border-radius: 8px;
        padding: 18px 22px;
        font-size: 13px;
        color: var(--text);
      }
      .error-box h3 {
        color: var(--bad);
        margin: 0 0 8px;
        font-size: 14px;
      }
      .error-box pre {
        background: var(--panel-2);
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 11px;
        font-family: var(--mono);
        white-space: pre-wrap;
        margin: 8px 0 0;
      }

      #prompt {
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        font-family: var(--mono);
        font-size: 12px;
        white-space: pre-wrap;
        overflow-y: auto;
        flex: 1;
        min-height: 60px;
        color: #cfd4dc;
      }
      .prompt-bar {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .prompt-bar h2 {
        margin: 0;
      }
      button.copy {
        margin-left: auto;
        background: var(--accent);
        color: #0b0d10;
        border: 0;
        border-radius: 6px;
        padding: 6px 12px;
        font: 600 12px system-ui;
        cursor: pointer;
      }
      button.copy.ok {
        background: var(--ok);
      }
    </style>
  </head>
  <body>
    <aside id="controls">
      <h1>Boundary Rules</h1>
      <p class="tag">
        Live view of <code>eslint-plugin-boundaries</code> dependency rules,
        parsed from the config file.
      </p>
      <div class="source-note" id="source-note">Loading config…</div>

      <h2>View</h2>
      <div class="preset-row">
        <button class="tog active" data-view="matrix">Matrix</button>
        <button class="tog" data-view="graph">Graph</button>
      </div>

      <h2>Element types</h2>
      <div class="type-list" id="type-list"></div>

      <h2 id="patterns-title" style="display: none">
        Globs for <span id="patterns-type"></span>
      </h2>
      <div class="patterns" id="patterns-box" style="display: none"></div>
    </aside>

    <main id="canvas-wrap">
      <div id="view"></div>
    </main>

    <div id="divider"></div>

    <section id="prompt-wrap">
      <div class="prompt-bar">
        <h2>Prompt</h2>
        <button class="copy" id="copy-btn">Copy</button>
      </div>
      <pre id="prompt">Select an element type to describe a rule.</pre>
    </section>

    <script type="module">
      // -----------------------------------------------------------------
      // Config loader: fetch eslint.boundaries.config.js and execute it
      // with stubbed imports so we get the live element + rule objects.
      // -----------------------------------------------------------------
      const CONFIG_PATH = '../eslint.boundaries.config.js';

      const state = {
        view: 'matrix',
        focused: null, // element type currently selected
        focusedEdge: null, // "from->to" key when an edge is selected
        elements: [], // [{ type, patterns: [], capture: [] }]
        rules: [], // [{ from: 'shared', to: 'auth', message, captured }]
        imports: null, // optional: { edges: { "from->to": { count, files: [...] } } }
        rawConfig: null,
      };

      const IMPORTS_PATH = './boundary-imports.json';

      async function loadImports() {
        try {
          const res = await fetch(IMPORTS_PATH);
          if (!res.ok) return null;
          return await res.json();
        } catch {
          return null;
        }
      }

      async function loadConfig() {
        const res = await fetch(CONFIG_PATH);
        if (!res.ok) throw new Error(`HTTP ${res.status} fetching config`);
        const text = await res.text();

        // Strip ESM imports — we'll inject stubs via function args.
        const noImports = text.replace(
          /^import\s+[\s\S]+?from\s+['"][^'"]+['"];?\s*$/gm,
          '',
        );
        // Convert `export default X` → `return X`
        const transformed = noImports.replace(/export\s+default\s+/, 'return ');

        // Stub anything imported by the config so it doesn't ReferenceError.
        // Currently: `boundaries` (plugin object) and `tseslint` (parser pkg).
        const stub = new Proxy(
          function () {},
          {
            get: () => stub,
            apply: () => stub,
            construct: () => stub,
          },
        );

        const fn = new Function(
          'boundaries',
          'tseslint',
          'require',
          'module',
          'exports',
          transformed,
        );
        return fn(stub, stub, () => stub, {}, {});
      }

      function extractFromConfig(config) {
        const elementsCfg = config.find(
          (c) => c.settings && c.settings['boundaries/elements'],
        );
        const elementsRaw = elementsCfg
          ? elementsCfg.settings['boundaries/elements']
          : [];

        const elements = elementsRaw.map((e) => ({
          type: e.type,
          patterns: Array.isArray(e.pattern) ? e.pattern : [e.pattern],
          capture: e.capture || [],
        }));

        const rules = [];
        config.forEach((c) => {
          if (!c.rules || !c.rules['boundaries/dependencies']) return;
          const ruleEntry = c.rules['boundaries/dependencies'];
          const ruleObj = Array.isArray(ruleEntry) ? ruleEntry[1] : ruleEntry;
          if (!ruleObj || !Array.isArray(ruleObj.rules)) return;
          ruleObj.rules.forEach((r) => {
            const fromType = r.from?.type;
            const message = r.message || '';
            (r.allow?.to || []).forEach((to) => {
              rules.push({
                from: fromType,
                to: to.type,
                captured: to.captured || null,
                message,
              });
            });
          });
        });

        return { elements, rules };
      }

      // -----------------------------------------------------------------
      // Color palette per element type (stable hash → HSL, auto-derived)
      // -----------------------------------------------------------------
      function colorFor(type) {
        let h = 0;
        for (const ch of type) h = (h * 31 + ch.charCodeAt(0)) % 360;
        return `hsl(${h}, 55%, 62%)`;
      }

      // -----------------------------------------------------------------
      // Rule lookup helpers
      // -----------------------------------------------------------------
      function rulesFrom(type) {
        return state.rules.filter((r) => r.from === type);
      }
      function isAllowed(from, to) {
        const matches = state.rules.filter(
          (r) => r.from === from && r.to === to,
        );
        if (matches.length === 0) return { kind: 'none' };
        // Captured means partial (e.g., only specific featureName allowed)
        const hasCaptured = matches.some((m) => m.captured);
        const hasFull = matches.some((m) => !m.captured);
        if (hasFull) return { kind: 'full', matches };
        return { kind: 'partial', matches };
      }

      // -----------------------------------------------------------------
      // Render: sidebar type list + patterns
      // -----------------------------------------------------------------
      function renderTypeList() {
        const list = document.getElementById('type-list');
        list.innerHTML = '';
        // Sort: types that have a "from" rule first, then alpha.
        const fromTypes = new Set(state.rules.map((r) => r.from));
        const sorted = [...state.elements].sort((a, b) => {
          const af = fromTypes.has(a.type) ? 0 : 1;
          const bf = fromTypes.has(b.type) ? 0 : 1;
          if (af !== bf) return af - bf;
          return a.type.localeCompare(b.type);
        });
        sorted.forEach((el) => {
          const row = document.createElement('div');
          row.className = 'type-row';
          if (state.focused === el.type) row.classList.add('active');
          const allowCount = rulesFrom(el.type).length;
          row.innerHTML = `
            <span class="dot" style="background:${colorFor(el.type)}"></span>
            <span class="name">${el.type}</span>
            <span class="meta">${allowCount ? `→ ${allowCount}` : 'no rule'}</span>
          `;
          row.onclick = () => focus(el.type);
          list.appendChild(row);
        });
      }

      function renderPatterns() {
        const title = document.getElementById('patterns-title');
        const box = document.getElementById('patterns-box');
        const nameSpan = document.getElementById('patterns-type');
        if (!state.focused) {
          title.style.display = 'none';
          box.style.display = 'none';
          return;
        }
        const el = state.elements.find((e) => e.type === state.focused);
        if (!el) {
          title.style.display = 'none';
          box.style.display = 'none';
          return;
        }
        title.style.display = '';
        box.style.display = '';
        nameSpan.textContent = el.type;
        box.textContent = el.patterns.join('\n');
      }

      // -----------------------------------------------------------------
      // Matrix view
      // -----------------------------------------------------------------
      function renderMatrix() {
        const types = state.elements.map((e) => e.type);
        const rowTypes = types.filter((t) =>
          state.rules.some((r) => r.from === t),
        );
        const colTypes = types;

        let html = '<table class="matrix"><thead><tr><th></th>';
        colTypes.forEach((t) => {
          const dim = state.focused && state.focused !== t ? '' : '';
          html += `<th class="col-label ${state.focused === t ? 'focused' : ''}" data-col="${t}">
            <span class="legend-dot" style="background:${colorFor(t)}"></span>${t}
          </th>`;
        });
        html += '</tr></thead><tbody>';

        rowTypes.forEach((from) => {
          const rowDim = state.focused && state.focused !== from;
          html += `<tr class="${rowDim ? 'dim-row' : ''}">
            <th class="row-label ${state.focused === from ? 'focused' : ''}" data-row="${from}">
              <span class="legend-dot" style="background:${colorFor(from)}"></span>${from}
            </th>`;
          colTypes.forEach((to) => {
            const status = isAllowed(from, to);
            let cls = 'cell ';
            if (status.kind === 'full') cls += 'allow';
            else if (status.kind === 'partial') cls += 'allow partial';
            else cls += 'disallow';
            if (from === to) cls += ' self';
            html += `<td class="${cls}" data-from="${from}" data-to="${to}" title="${from} → ${to}"></td>`;
          });
          html += '</tr>';
        });
        html += '</tbody></table>';

        html += `<div class="legend">
          <span><i style="color:var(--ok)">✓</i> allowed</span>
          <span><i style="color:var(--warn)">~</i> partial (capture-restricted)</span>
          <span><i style="color:#404750">·</i> disallowed (default)</span>
        </div>`;

        html += renderRuleDetail();

        document.getElementById('view').innerHTML = html;

        // Wire interactions
        document.querySelectorAll('.matrix th.row-label, .matrix th.col-label')
          .forEach((th) => {
            th.onclick = () => {
              const t = th.dataset.row || th.dataset.col;
              focus(state.focused === t ? null : t);
            };
          });
        document.querySelectorAll('.matrix td.cell').forEach((td) => {
          td.onclick = () => {
            const from = td.dataset.from;
            const status = isAllowed(from, td.dataset.to);
            if (status.kind !== 'none') focus(from);
          };
        });
      }

      // Strip the universal `src/` prefix — every classified file lives there,
      // so it's pure noise in the UI.
      const trimSrc = (p) => (p.startsWith('src/') ? p.slice(4) : p);

      function renderEdgeDetail() {
        const [from, to] = state.focusedEdge.split('->');
        const entry = state.imports?.edges?.[state.focusedEdge];
        if (!entry || !entry.files.length) {
          return `<div class="rule-detail">
            <h3><code>${from}</code> → <code>${to}</code></h3>
            <p class="empty">No imports recorded for this edge. ${
              state.imports
                ? 'The rule allows this edge but no source file currently uses it.'
                : 'Run <code>pnpm play:boundaries:scan</code> to populate import data.'
            }</p>
          </div>`;
        }
        // Group by source file → list imported targets
        const bySource = new Map();
        for (const f of entry.files) {
          if (!bySource.has(f.from)) bySource.set(f.from, []);
          bySource.get(f.from).push(f);
        }
        const groups = [...bySource.entries()]
          .map(([src, list]) => {
            const items = list
              .map(
                (f) =>
                  `<li><code>${trimSrc(f.to)}</code> <span class="muted">via <code>${f.importPath}</code></span></li>`,
              )
              .join('');
            return `<div class="edge-group">
              <div class="edge-source"><code>${trimSrc(src)}</code></div>
              <ul>${items}</ul>
            </div>`;
          })
          .join('');
        return `<div class="rule-detail edge-detail">
          <h3><code>${from}</code> → <code>${to}</code>
            <span class="muted">· ${entry.count} import${entry.count === 1 ? '' : 's'} across ${bySource.size} file${bySource.size === 1 ? '' : 's'}</span>
          </h3>
          ${groups}
        </div>`;
      }

      function renderRuleDetail() {
        if (state.focusedEdge) return renderEdgeDetail();
        if (!state.focused) {
          return `<div class="rule-detail empty">
            <p class="empty">Click an element type (left sidebar or matrix label) to see its dependency rule${
              state.imports ? '. Then click one of its edges to list the underlying imports' : ''
            }.</p>
          </div>`;
        }
        const from = state.focused;
        const rs = rulesFrom(from);
        if (rs.length === 0) {
          return `<div class="rule-detail">
            <h3>${from}</h3>
            <p class="empty">No explicit dependency rule defined. With <code>default: 'disallow'</code>, this element type cannot import from any other element type.</p>
          </div>`;
        }
        const message = rs[0].message;
        const targets = rs.map((r) => {
          if (r.captured) {
            const caps = Object.entries(r.captured)
              .map(([k, v]) => `${k}=<code>${v}</code>`)
              .join(', ');
            return `<li><code>${r.to}</code> — only where ${caps}</li>`;
          }
          return `<li><code>${r.to}</code></li>`;
        });
        return `<div class="rule-detail">
          <h3>${from}</h3>
          <p>Allowed imports from <code>${from}</code>:</p>
          <ul>${targets.join('')}</ul>
          ${message ? `<p class="msg">"${message}"</p>` : ''}
        </div>`;
      }

      // -----------------------------------------------------------------
      // Graph view (SVG, radial layout)
      // -----------------------------------------------------------------
      function renderGraph() {
        const types = state.elements.map((e) => e.type);
        const W = 720,
          H = 520;
        const cx = W / 2,
          cy = H / 2;
        const R = Math.min(W, H) / 2 - 80;
        const nodes = types.map((t, i) => {
          const angle = (i / types.length) * Math.PI * 2 - Math.PI / 2;
          return {
            type: t,
            x: cx + R * Math.cos(angle),
            y: cy + R * Math.sin(angle),
          };
        });
        const byType = Object.fromEntries(nodes.map((n) => [n.type, n]));

        // Build edges (only render when source/target are visible)
        const edges = state.rules
          .filter((r) => byType[r.from] && byType[r.to] && r.from !== r.to)
          .map((r) => ({
            ...r,
            sx: byType[r.from].x,
            sy: byType[r.from].y,
            tx: byType[r.to].x,
            ty: byType[r.to].y,
            kind: r.captured ? 'partial' : 'full',
          }));

        // Self-loops (allow self-imports) drawn as small circles
        const selfLoops = state.rules.filter(
          (r) => r.from === r.to && byType[r.from],
        );

        const dim = (t) => state.focused && state.focused !== t;
        const edgeVisible = (e) =>
          !state.focused ||
          e.from === state.focused ||
          e.to === state.focused;

        let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="display:block;margin:0 auto">`;
        svg += `<defs>
          <marker id="arrow-full" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <polygon points="0 0, 8 4, 0 8" fill="#6ea8fe"/>
          </marker>
          <marker id="arrow-partial" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <polygon points="0 0, 8 4, 0 8" fill="#e0a44a"/>
          </marker>
        </defs>`;

        // Edges
        edges.forEach((e) => {
          const visible = edgeVisible(e);
          const key = `${e.from}->${e.to}`;
          const isFocused = state.focusedEdge === key;
          const opacity = isFocused
            ? 1
            : visible
              ? (dim(e.from) && dim(e.to) ? 0.15 : 0.85)
              : 0.06;
          const dx = e.tx - e.sx,
            dy = e.ty - e.sy;
          const len = Math.hypot(dx, dy) || 1;
          // Shorten so arrowhead lands outside node circle (r=26)
          const ox = (dx / len) * 28;
          const oy = (dy / len) * 28;
          const sx = e.sx + ox,
            sy = e.sy + oy;
          const tx = e.tx - ox,
            ty = e.ty - oy;
          const color = e.kind === 'partial' ? '#e0a44a' : '#6ea8fe';
          const marker = e.kind === 'partial' ? 'arrow-partial' : 'arrow-full';
          const width = isFocused ? 2.6 : 1.6;
          // Badge + clickability are gated on a focused node and the edge
          // touching it — keeps unfocused view uncluttered.
          const edgeRelevant =
            !!state.focused &&
            (e.from === state.focused || e.to === state.focused);
          const count = state.imports?.edges?.[key]?.count;
          const clickable = state.imports != null && edgeRelevant;
          const showBadge = edgeRelevant && count != null;
          // Wider invisible hit area for easier clicking
          svg += `<g class="gedge${clickable ? ' clickable' : ''}" data-key="${key}"${clickable ? ' style="cursor:pointer"' : ''}>`;
          svg += `<line x1="${sx}" y1="${sy}" x2="${tx}" y2="${ty}"
            stroke="transparent" stroke-width="14" />`;
          svg += `<line x1="${sx}" y1="${sy}" x2="${tx}" y2="${ty}"
            stroke="${color}" stroke-width="${width}" opacity="${opacity}"
            marker-end="url(#${marker})" />`;
          if (showBadge) {
            const mx = (sx + tx) / 2;
            const my = (sy + ty) / 2;
            svg += `<g pointer-events="none" opacity="${opacity}">
              <circle cx="${mx}" cy="${my}" r="9" fill="#1a1d21" stroke="${color}" stroke-width="1"/>
              <text x="${mx}" y="${my + 3}" text-anchor="middle" font-size="10" fill="#e8eaed">${count}</text>
            </g>`;
          }
          svg += `</g>`;
        });

        // Self-loops
        selfLoops.forEach((r) => {
          const n = byType[r.from];
          const visible = !state.focused || state.focused === r.from;
          const opacity = visible ? 0.85 : 0.06;
          svg += `<circle cx="${n.x + 22}" cy="${n.y - 22}" r="10"
            fill="none" stroke="#6ea8fe" stroke-width="1.4" opacity="${opacity}"/>`;
        });

        // Nodes
        nodes.forEach((n) => {
          const isFocused = state.focused === n.type;
          const opacity = state.focused && !isFocused ? 0.45 : 1;
          const color = colorFor(n.type);
          svg += `<g class="gnode" data-type="${n.type}" style="cursor:pointer;opacity:${opacity}">
            <circle cx="${n.x}" cy="${n.y}" r="26" fill="${color}"
              stroke="${isFocused ? '#fff' : 'none'}" stroke-width="${isFocused ? 2 : 0}"/>
            <text x="${n.x}" y="${n.y + 4}" text-anchor="middle"
              font-size="11" font-weight="600" fill="#0b0d10"
              pointer-events="none">${n.type}</text>
          </g>`;
        });

        svg += '</svg>';

        const detail = renderRuleDetail();
        const legend = `<div class="legend">
          <span><i style="color:var(--accent)">→</i> allowed</span>
          <span><i style="color:var(--warn)">→</i> partial (capture-restricted)</span>
          <span>↻ self-loop = may import itself</span>
        </div>`;

        document.getElementById('view').innerHTML = svg + legend + detail;
        document.querySelectorAll('g.gnode').forEach((g) => {
          g.onclick = () => {
            const t = g.dataset.type;
            focus(state.focused === t ? null : t);
          };
        });
        document.querySelectorAll('g.gedge.clickable').forEach((g) => {
          g.onclick = (ev) => {
            ev.stopPropagation();
            // Bidirectional pairs (A→B and B→A) render two overlapping <g>
            // elements at the same coords; the click may hit the wrong one.
            // Resolve to the direction relevant to the focused node:
            // prefer outgoing (focused → other), fall back to incoming.
            const k = g.dataset.key;
            const [a, b] = k.split('->');
            const other = a === state.focused ? b : a;
            const outgoing = `${state.focused}->${other}`;
            const incoming = `${other}->${state.focused}`;
            const edges = state.imports?.edges || {};
            const resolved = edges[outgoing]
              ? outgoing
              : edges[incoming]
                ? incoming
                : k;
            focusEdge(state.focusedEdge === resolved ? null : resolved);
          };
        });
      }

      // -----------------------------------------------------------------
      // Prompt
      // -----------------------------------------------------------------
      function updatePrompt() {
        const el = document.getElementById('prompt');
        if (state.focusedEdge) {
          const [from, to] = state.focusedEdge.split('->');
          const entry = state.imports?.edges?.[state.focusedEdge];
          const lines = [`Edge \`${from}\` → \`${to}\``];
          if (!entry) {
            lines.push(`  No imports recorded for this edge.`);
          } else {
            lines.push(`  ${entry.count} import(s) across the codebase:`);
            entry.files.forEach((f) => {
              lines.push(`    - ${trimSrc(f.from)}  →  ${trimSrc(f.to)}`);
            });
          }
          el.textContent = lines.join('\n');
          return;
        }
        if (!state.focused) {
          el.textContent = `The boundary config defines ${state.elements.length} element types: ${state.elements
            .map((e) => e.type)
            .join(', ')}.\n\nClick a type to focus a specific rule.`;
          return;
        }
        const from = state.focused;
        const elDef = state.elements.find((e) => e.type === from);
        const rs = rulesFrom(from);
        const lines = [];
        lines.push(`Element type \`${from}\` (in eslint.boundaries.config.js):`);
        if (elDef) {
          lines.push(`  Matches: ${elDef.patterns.join(', ')}`);
        }
        if (rs.length === 0) {
          lines.push(`  No dependency rule defined — with the default 'disallow', this type cannot import from any other element type.`);
        } else {
          lines.push(`  Allowed to import from:`);
          rs.forEach((r) => {
            if (r.captured) {
              const caps = Object.entries(r.captured)
                .map(([k, v]) => `${k}=${v}`)
                .join(', ');
              lines.push(`    - ${r.to} (only where ${caps})`);
            } else {
              lines.push(`    - ${r.to}`);
            }
          });
          if (rs[0].message) {
            lines.push(`  Message: "${rs[0].message}"`);
          }
        }
        el.textContent = lines.join('\n');
      }

      // -----------------------------------------------------------------
      // Orchestration
      // -----------------------------------------------------------------
      function focus(type) {
        state.focused = type;
        state.focusedEdge = null;
        renderTypeList();
        renderPatterns();
        renderView();
        updatePrompt();
      }
      function focusEdge(key) {
        state.focusedEdge = key;
        // Keep state.focused as-is — edge selection happens within a focused node's view.
        renderTypeList();
        renderPatterns();
        renderView();
        updatePrompt();
      }
      function renderView() {
        if (state.view === 'graph') renderGraph();
        else renderMatrix();
      }

      function setSourceNote(text, isErr = false) {
        const note = document.getElementById('source-note');
        note.textContent = text;
        note.className = 'source-note' + (isErr ? ' err' : '');
      }

      function showError(err) {
        document.getElementById('view').innerHTML = `
          <div class="error-box">
            <h3>Could not load eslint.boundaries.config.js</h3>
            <p>This playground reads the live config via <code>fetch()</code>, so it needs to be served over HTTP (not opened with <code>file://</code>).</p>
            <p>Quick fix — from repo root, run one of:</p>
            <pre>python3 -m http.server 8080
# then open: http://localhost:8080/playgrounds/boundary-rules.html

# or:
pnpm play:boundaries</pre>
            <p style="margin-top:14px;color:var(--muted)">Error: <code>${(err && err.message) || err}</code></p>
          </div>`;
      }

      // View toggle
      document.querySelectorAll('button.tog').forEach((b) => {
        b.onclick = () => {
          document
            .querySelectorAll('button.tog')
            .forEach((x) => x.classList.remove('active'));
          b.classList.add('active');
          state.view = b.dataset.view;
          renderView();
        };
      });

      // Copy
      document.getElementById('copy-btn').onclick = async () => {
        const btn = document.getElementById('copy-btn');
        await navigator.clipboard.writeText(
          document.getElementById('prompt').textContent,
        );
        btn.textContent = 'Copied!';
        btn.classList.add('ok');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('ok');
        }, 1200);
      };

      // Divider drag
      const divider = document.getElementById('divider');
      let dragging = false;
      divider.addEventListener('mousedown', (e) => {
        dragging = true;
        document.body.classList.add('resizing');
        divider.classList.add('dragging');
        e.preventDefault();
      });
      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const fromBottom = window.innerHeight - e.clientY;
        const h = Math.max(80, Math.min(window.innerHeight - 120, fromBottom));
        document.body.style.setProperty('--prompt-h', `${h}px`);
      });
      window.addEventListener('mouseup', () => {
        dragging = false;
        document.body.classList.remove('resizing');
        divider.classList.remove('dragging');
      });

      // Boot
      (async () => {
        try {
          const cfg = await loadConfig();
          state.rawConfig = cfg;
          const { elements, rules } = extractFromConfig(cfg);
          state.elements = elements;
          state.rules = rules;
          state.imports = await loadImports();
          const edgeCount = state.imports
            ? Object.keys(state.imports.edges).length
            : 0;
          const importsNote = state.imports
            ? ` · ${edgeCount} edges from ${state.imports.scannedFiles} src files (${IMPORTS_PATH})`
            : ` · no import data — run pnpm play:boundaries:scan`;
          setSourceNote(
            `Source: ${CONFIG_PATH} · ${elements.length} types · ${rules.length} allow-edges${importsNote}`,
          );
          renderTypeList();
          renderView();
          updatePrompt();
        } catch (err) {
          setSourceNote('Failed to load config', true);
          showError(err);
        }
      })();
    </script>
  </body>
</html>
