<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Core Ownership Model</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --ink: #17212b;
        --muted: #617181;
        --line: #aab7c4;
        --user: #41a575;
        --conversation: #4f7fd9;
        --room: #d98632;
        --call: #9465c5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      main {
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 40px 22px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 30px;
        font-weight: 760;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
      }

      .graph {
        margin-top: 28px;
        overflow-x: auto;
        border: 1px solid #d7dee6;
        border-radius: 8px;
        background: #fff;
      }

      svg {
        display: block;
        width: 100%;
        min-width: 900px;
        height: auto;
      }

      .edge {
        fill: none;
        stroke: var(--line);
        stroke-width: 2;
      }

      .edge.dashed {
        stroke-dasharray: 7 7;
      }

      .edge-label {
        fill: var(--muted);
        font-size: 13px;
        font-weight: 620;
      }

      .node rect {
        fill: #fff;
        stroke-width: 3;
        rx: 8;
      }

      .node.user rect {
        stroke: var(--user);
      }

      .node.conversation rect {
        stroke: var(--conversation);
      }

      .node.room rect {
        stroke: var(--room);
      }

      .node.call rect {
        stroke: var(--call);
      }

      .title {
        fill: var(--ink);
        font-size: 18px;
        font-weight: 760;
      }

      .id {
        fill: var(--muted);
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
      }

      .note {
        fill: var(--muted);
        font-size: 12px;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .legend i {
        width: 16px;
        height: 3px;
        background: var(--line);
      }

      .legend .dashed i {
        background: repeating-linear-gradient(
          to right,
          var(--line) 0 7px,
          transparent 7px 14px
        );
      }

      @media (max-width: 760px) {
        main {
          padding: 28px 14px;
        }

        h1 {
          font-size: 25px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Core Ownership Model</h1>
      <p>Minimal relationship view of the core entities and IDs.</p>

      <section class="graph" aria-label="Core ownership graph">
        <svg viewBox="0 0 980 560" role="img">
          <defs>
            <marker
              id="arrow"
              markerWidth="10"
              markerHeight="10"
              refX="8"
              refY="5"
              orient="auto"
              markerUnits="strokeWidth"
            >
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#aab7c4" />
            </marker>
          </defs>

          <path
            class="edge"
            marker-end="url(#arrow)"
            d="M 220 160 C 320 160 338 130 420 130"
          />
          <text class="edge-label" x="278" y="136">participants</text>

          <path
            class="edge"
            marker-end="url(#arrow)"
            d="M 220 280 C 320 280 338 318 420 318"
          />
          <text class="edge-label" x="280" y="315">participants</text>

          <path
            class="edge dashed"
            d="M 570 184 C 610 230 610 260 570 306"
          />
          <text class="edge-label" x="618" y="248">same user pair</text>

          <path
            class="edge"
            marker-end="url(#arrow)"
            d="M 760 318 C 720 318 706 318 660 318"
          />
          <text class="edge-label" x="681" y="300">points to</text>

          <path
            class="edge"
            marker-end="url(#arrow)"
            d="M 220 392 C 340 470 620 470 760 392"
          />
          <text class="edge-label" x="426" y="486">callee owns invite slot</text>

          <g class="node user" transform="translate(60 170)">
            <rect width="160" height="220" />
            <text class="title" x="80" y="62" text-anchor="middle">User</text>
            <text class="id" x="80" y="92" text-anchor="middle">uid</text>
            <text class="note" x="80" y="134" text-anchor="middle">owns</text>
            <text class="id" x="80" y="156" text-anchor="middle">users/{uid}</text>
          </g>

          <g class="node conversation" transform="translate(420 74)">
            <rect width="240" height="110" />
            <text class="title" x="120" y="45" text-anchor="middle">
              Conversation
            </text>
            <text class="id" x="120" y="75" text-anchor="middle">
              conversationId
            </text>
          </g>

          <g class="node room" transform="translate(420 262)">
            <rect width="240" height="110" />
            <text class="title" x="120" y="45" text-anchor="middle">Room</text>
            <text class="id" x="120" y="75" text-anchor="middle">roomId</text>
          </g>

          <g class="node call" transform="translate(760 262)">
            <rect width="160" height="130" />
            <text class="title" x="80" y="48" text-anchor="middle">
              Call Invite
            </text>
            <text class="id" x="80" y="78" text-anchor="middle">
              roomId ref
            </text>
            <text class="note" x="80" y="106" text-anchor="middle">
              transient
            </text>
          </g>
        </svg>
      </section>

      <section class="legend" aria-label="Legend">
        <span><i></i>ownership/reference</span>
        <span class="dashed"><i></i>inferred relationship</span>
      </section>
    </main>
  </body>
</html>
